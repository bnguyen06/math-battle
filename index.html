<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Penguin vs White Bear Math Battle</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #87CEEB;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  overflow-x: hidden;
}
#game-wrapper {
  width: 100%;
  max-width: 500px;
  position: relative;
}
canvas {
  width: 100%;
  display: block;
}
#ui-layer {
  padding: 12px 16px 20px;
  background: rgba(255,255,255,0.95);
  border-radius: 20px 20px 0 0;
  margin-top: -10px;
  position: relative;
  z-index: 2;
}
h2 { font-size: 22px; font-weight: 600; color: #1a2a3a; }
.sub { font-size: 14px; color: #5a6a7a; }
.btn-primary {
  padding: 12px 40px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 14px;
  cursor: pointer;
  background: #2a7de1;
  color: #fff;
  border: none;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { transform: scale(0.97); background: #1f6bc7; }
.btn-diff {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 500;
  border-radius: 10px;
  cursor: pointer;
  background: transparent;
  color: #5a6a7a;
  border: 1.5px solid #d0d8e0;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-diff.active {
  background: #e8f2ff;
  color: #2a7de1;
  border-color: #2a7de1;
}
.choice-btn {
  padding: 16px;
  font-size: 22px;
  font-weight: 600;
  border-radius: 14px;
  cursor: pointer;
  border: 2.5px solid #d0d8e0;
  background: #fff;
  color: #1a2a3a;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.choice-btn:active { transform: scale(0.97); }
.choice-btn.correct { background: #e6f9ee; border-color: #1d9e75; color: #0f6e56; }
.choice-btn.wrong { background: #fde8e8; border-color: #e24b4a; color: #a32d2d; }
.hp-bar {
  width: 100%;
  height: 10px;
  background: #e8edf2;
  border-radius: 5px;
  overflow: hidden;
}
.hp-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.4s ease;
}
.stats-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #5a6a7a;
  margin-top: 10px;
}
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="arena" width="500" height="300"></canvas>
  <div id="ui-layer">
    <!-- START SCREEN -->
    <div id="screen-start" style="text-align: center; padding: 8px 0;">
      <h2 style="margin-bottom: 6px;">Arctic math battle</h2>
      <p class="sub" style="margin-bottom: 16px;">Solve math problems to throw snowballs at the white bear. Knock him into the icy water!</p>
      <div style="margin-bottom: 14px;">
        <div class="sub" style="margin-bottom: 8px;">Math type</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; max-width: 340px; margin: 0 auto;">
          <button class="btn-diff" id="btn-op-add" onclick="setOp('add')">Addition</button>
          <button class="btn-diff" id="btn-op-sub" onclick="setOp('sub')">Subtraction</button>
          <button class="btn-diff" id="btn-op-addsub" onclick="setOp('addsub')">Add + Sub</button>
          <button class="btn-diff active" id="btn-op-mul" onclick="setOp('mul')">Multiply</button>
          <button class="btn-diff" id="btn-op-div" onclick="setOp('div')">Division</button>
          <button class="btn-diff" id="btn-op-muldiv" onclick="setOp('muldiv')">Mult + Div</button>
        </div>
      </div>
      <div style="margin-bottom: 18px;">
        <div class="sub" style="margin-bottom: 8px;">Difficulty</div>
        <div style="display: flex; gap: 8px; justify-content: center;">
          <button class="btn-diff active" id="btn-easy" onclick="setDiff('easy')">Easy (1-5)</button>
          <button class="btn-diff" id="btn-medium" onclick="setDiff('medium')">Medium (1-9)</button>
          <button class="btn-diff" id="btn-hard" onclick="setDiff('hard')">Hard (1-12)</button>
        </div>
      </div>
      <button class="btn-primary" onclick="startGame()">Start battle!</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-game" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <div style="flex: 0 0 110px;">
          <div style="font-size: 13px; font-weight: 600; color: #1a2a3a; margin-bottom: 3px;">Penguin</div>
          <div class="hp-bar"><div class="hp-fill" id="penguin-hp-fill" style="width:100%; background:#1d9e75;"></div></div>
          <div id="penguin-hp-text" style="font-size: 11px; color: #5a6a7a; margin-top: 2px;">5 / 5</div>
        </div>
        <div id="battle-action" style="font-size: 13px; color: #5a6a7a; text-align: center; flex: 1; padding: 0 8px;"></div>
        <div style="flex: 0 0 110px; text-align: right;">
          <div style="font-size: 13px; font-weight: 600; color: #1a2a3a; margin-bottom: 3px;">White bear</div>
          <div class="hp-bar"><div class="hp-fill" id="bear-hp-fill" style="width:100%; background:#e24b4a;"></div></div>
          <div id="bear-hp-text" style="font-size: 11px; color: #5a6a7a; margin-top: 2px; text-align: right;">5 / 5</div>
        </div>
      </div>

      <div style="background: #f0f5fa; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 10px;">
        <div id="boss-timer" style="display: none; margin: 0 auto 10px; width: 50px; height: 50px; border-radius: 50%; border: 4px solid #8b5cf6; font-size: 26px; font-weight: 700; color: #1a2a3a; line-height: 42px; text-align: center; transition: all 0.3s;">7</div>
        <div id="question" style="font-size: 30px; font-weight: 700; color: #1a2a3a; margin-bottom: 14px;"></div>
        <div id="choices" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 320px; margin: 0 auto;"></div>
        <div id="feedback" style="margin-top: 12px; font-size: 14px; font-weight: 500; min-height: 22px;"></div>
      </div>

      <div class="stats-row">
        <span>Score: <strong id="score">0</strong></span>
        <span>Streak: <strong id="streak">0</strong> <span style="font-size:15px;">&#x1F525;</span></span>
        <span>Round: <strong id="round">1</strong></span>
      </div>
    </div>

    <!-- END SCREEN -->
    <div id="screen-end" style="display: none; text-align: center; padding: 8px 0;">
      <h2 id="end-title" style="margin-bottom: 8px;"></h2>
      <p id="end-msg" class="sub" style="margin-bottom: 8px;"></p>
      <div id="end-stats" class="sub" style="margin-bottom: 20px;"></div>
      <button class="btn-primary" onclick="startGame()">Play again!</button>
    </div>
  </div>
</div>

var seagullImgLoaded = false;
seagullImg.onload = function() { seagullImgLoaded = true; };
var SEAGULL_FRAMES = 7;
var SEAGULL_FRAME_W = 620;
var SEAGULL_FRAME_H = 280;






var gameState = 'start'; // start, playing, ending

function drawSky() {
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  if (isBoss) {
    // Dark stormy blizzard sky
    grad.addColorStop(0, '#5a6e82');
    grad.addColorStop(0.5, '#7a8fa5');
    grad.addColorStop(1, '#8fa5b8');
  } else {
    grad.addColorStop(0, '#a8d8ea');
    grad.addColorStop(0.5, '#cbe7f5');
    grad.addColorStop(1, '#e8f4f8');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // clouds (darker during boss)
  ctx.fillStyle = isBoss ? 'rgba(180,190,200,0.6)' : 'rgba(255,255,255,0.7)';
  drawCloud(60, 40, 40);
  drawCloud(250, 25, 30);
  drawCloud(400, 50, 35);
  drawCloud(180, 65, 25);
  if (isBoss) {
    // Extra storm clouds
    ctx.fillStyle = 'rgba(140,155,170,0.5)';
    drawCloud(130, 30, 50);
    drawCloud(350, 20, 45);
    drawCloud(450, 40, 40);
  }
}

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.8, y - r * 0.3, r * 0.7, 0, Math.PI * 2);
  ctx.arc(x + r * 1.4, y, r * 0.6, 0, Math.PI * 2);
  ctx.arc(x - r * 0.5, y + r * 0.1, r * 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawWater() {
  var grad = ctx.createLinearGradient(0, WATER_Y, 0, H);
  grad.addColorStop(0, '#3a9bd5');
  grad.addColorStop(0.3, '#2d88c0');
  grad.addColorStop(1, '#1a6a9a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, WATER_Y, W, H - WATER_Y);

  // wave highlights
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  var t = Date.now() / 800;
  for (var i = 0; i < 5; i++) {
    ctx.beginPath();
    var wy = WATER_Y + 10 + i * 14;
    for (var wx = 0; wx < W; wx += 5) {
      ctx.lineTo(wx, wy + Math.sin(wx / 30 + t + i) * 3);
    }
    ctx.stroke();
  }
}

function drawIce() {
  // ice platform - gap in middle (water visible)
  ctx.fillStyle = '#e8f4ff';
  ctx.strokeStyle = '#b8d8ef';
  ctx.lineWidth = 2;

  // left ice block (penguin's side)
  drawIceBlock(0, ICE_Y, 210, WATER_Y - ICE_Y + 5);
  // right ice block (bear's side)
  drawIceBlock(290, ICE_Y, 210, WATER_Y - ICE_Y + 5);

  // ice surface shine
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(10, ICE_Y + 2, 190, 4);
  ctx.fillRect(300, ICE_Y + 2, 190, 4);
}

function drawIceBlock(x, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(x + 5, y);
  ctx.lineTo(x + w - 5, y);
  // jagged bottom edge
  ctx.lineTo(x + w, y + h * 0.6);
  ctx.lineTo(x + w - 15, y + h * 0.8);
  ctx.lineTo(x + w - 5, y + h);
  ctx.lineTo(x + 20, y + h - 5);
  ctx.lineTo(x + 10, y + h * 0.7);
  ctx.lineTo(x, y + h * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // cracks
  ctx.strokeStyle = 'rgba(150,200,230,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + w * 0.3, y);
  ctx.lineTo(x + w * 0.35, y + h * 0.4);
  ctx.lineTo(x + w * 0.25, y + h * 0.6);
  ctx.stroke();
  ctx.strokeStyle = '#b8d8ef';
  ctx.lineWidth = 2;
}

function drawPenguin(p) {
  ctx.save();
  var drawY = p.falling ? p.y + p.fallY : p.y;
  var drawX = p.x;
  if (p.wobble) {
    drawX += Math.sin(Date.now() / 50) * p.wobble;
  }
  // idle bounce
  var bounce = p.falling ? 0 : Math.sin(Date.now() / 350) * 3;
  ctx.translate(drawX + p.w / 2, drawY + p.h / 2 + bounce);

  if (p.falling) {
    ctx.rotate(Math.sin(Date.now() / 100) * 0.3);
    ctx.globalAlpha = Math.max(0, 1 - p.fallY / 120);
  }

  // shadow
  if (!p.falling) {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.ellipse(0, 38, 24, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  if (penguinImgLoaded) {
    var imgW = 80, imgH = 80;
    ctx.drawImage(penguinImg, -imgW / 2, -imgH / 2 - 2, imgW, imgH);
  } else {
    ctx.fillStyle = '#2a2a3e';
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.fill();
  }

  // PIRATE HAT (unlocked after boss)
  if (hasPirateHat && streak < 3 && !p.falling && pirateHatLoaded) {
    ctx.drawImage(pirateHatImg, -22, -52, 44, 44);
  }

  // WIZARD HAT when streak >= 3 (overrides pirate hat)
  if (streak >= 3 && !p.falling) {
    var hx = -2, hy = -48;
    var starPulse = 0.8 + Math.sin(Date.now() / 200) * 0.2;

    // hat glow
    ctx.fillStyle = 'rgba(120, 80, 255, ' + (0.15 * starPulse) + ')';
    ctx.beginPath();
    ctx.arc(hx, hy - 10, 28, 0, Math.PI * 2);
    ctx.fill();

    // hat brim
    ctx.fillStyle = '#2c1a6e';
    ctx.beginPath();
    ctx.ellipse(hx, hy + 18, 22, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // hat cone
    ctx.fillStyle = '#3b22a0';
    ctx.beginPath();
    ctx.moveTo(hx - 18, hy + 16);
    ctx.quadraticCurveTo(hx - 8, hy - 20, hx + 4, hy - 35);
    ctx.quadraticCurveTo(hx + 10, hy - 28, hx + 8, hy - 18);
    ctx.quadraticCurveTo(hx + 12, hy - 5, hx + 18, hy + 16);
    ctx.closePath();
    ctx.fill();

    // hat tip curves over
    ctx.beginPath();
    ctx.moveTo(hx + 4, hy - 35);
    ctx.quadraticCurveTo(hx + 14, hy - 40, hx + 18, hy - 30);
    ctx.strokeStyle = '#3b22a0';
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.fillStyle = '#3b22a0';
    ctx.beginPath();
    ctx.arc(hx + 18, hy - 30, 3, 0, Math.PI * 2);
    ctx.fill();

    // hat band
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(hx - 17, hy + 12);
    ctx.quadraticCurveTo(hx, hy + 8, hx + 17, hy + 12);
    ctx.lineTo(hx + 17, hy + 16);
    ctx.quadraticCurveTo(hx, hy + 12, hx - 17, hy + 16);
    ctx.closePath();
    ctx.fill();

    // stars on hat
    ctx.fillStyle = 'rgba(255, 215, 0, ' + starPulse + ')';
    drawStar(ctx, hx - 6, hy - 5, 4, 5);
    drawStar(ctx, hx + 2, hy - 18, 3, 5);
    ctx.fillStyle = 'rgba(200, 220, 255, ' + starPulse + ')';
    drawStar(ctx, hx + 8, hy - 8, 2.5, 5);

    // sparkle particles around hat
    var t = Date.now() / 300;
    ctx.fillStyle = 'rgba(255, 215, 0, ' + (0.6 * starPulse) + ')';
    for (var sp = 0; sp < 4; sp++) {
      var angle = t + sp * 1.57;
      var dist = 22 + Math.sin(t * 2 + sp) * 5;
      var sx = hx + Math.cos(angle) * dist;
      var sy = (hy - 5) + Math.sin(angle) * dist * 0.6;
      drawStar(ctx, sx, sy, 1.5 + Math.sin(t + sp) * 0.5, 4);
    }
  }

  ctx.restore();
}

function drawStar(c, cx, cy, r, points) {
  c.beginPath();
  for (var i = 0; i < points * 2; i++) {
    var radius = i % 2 === 0 ? r : r * 0.4;
    var angle = (i * Math.PI / points) - Math.PI / 2;
    if (i === 0) c.moveTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
    else c.lineTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
  }
  c.closePath();
  c.fill();
}

function drawBear(b) {
  ctx.save();
  var drawY = b.falling ? b.y + b.fallY : b.y;
  var drawX = b.x;
  if (b.wobble) {
    drawX += Math.sin(Date.now() / 50) * b.wobble;
  }
  // idle sway
  var sway = b.falling ? 0 : Math.sin(Date.now() / 500) * 1.5;
  ctx.translate(drawX + b.w / 2, drawY + b.h / 2 + sway);

  if (b.falling) {
    ctx.rotate(Math.sin(Date.now() / 80) * 0.4);
    ctx.globalAlpha = Math.max(0, 1 - b.fallY / 120);
  }

  // shadow
  if (!b.falling) {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.ellipse(0, 38, 30, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  if (isBoss) {
    // Draw yeti boss - big angry snow monster
    var s = 1.3;
    // body (big chunky)
    ctx.fillStyle = '#dce8f0';
    ctx.beginPath();
    ctx.ellipse(0, 8 * s, 28 * s, 34 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // fur texture lines
    ctx.strokeStyle = '#c0d0dd';
    ctx.lineWidth = 1;
    for (var fi = 0; fi < 8; fi++) {
      ctx.beginPath();
      var fx = (Math.random() - 0.5) * 40 * s;
      var fy = -5 * s + Math.random() * 30 * s;
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + (Math.random()-0.5)*8, fy + 8);
      ctx.stroke();
    }
    // big arms
    ctx.fillStyle = '#dce8f0';
    ctx.save();
    ctx.translate(-30 * s, 5 * s);
    ctx.rotate(-0.3);
    ctx.beginPath();
    ctx.ellipse(0, 0, 12 * s, 22 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(30 * s, 5 * s);
    ctx.rotate(0.3);
    ctx.beginPath();
    ctx.ellipse(0, 0, 12 * s, 22 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // legs
    ctx.beginPath();
    ctx.ellipse(-12 * s, 36 * s, 12 * s, 8 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(12 * s, 36 * s, 12 * s, 8 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // head
    ctx.fillStyle = '#dce8f0';
    ctx.beginPath();
    ctx.arc(0, -26 * s, 24 * s, 0, Math.PI * 2);
    ctx.fill();
    // horns
    ctx.fillStyle = '#5ba8c8';
    ctx.beginPath();
    ctx.moveTo(-14 * s, -42 * s);
    ctx.lineTo(-10 * s, -56 * s);
    ctx.lineTo(-6 * s, -42 * s);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(14 * s, -42 * s);
    ctx.lineTo(10 * s, -56 * s);
    ctx.lineTo(6 * s, -42 * s);
    ctx.closePath();
    ctx.fill();
    // angry face
    ctx.fillStyle = '#7abfcc';
    ctx.beginPath();
    ctx.ellipse(0, -22 * s, 16 * s, 14 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // angry eyes
    ctx.fillStyle = '#ccee33';
    ctx.beginPath();
    ctx.ellipse(-7 * s, -28 * s, 5 * s, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(7 * s, -28 * s, 5 * s, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // pupils
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-7 * s, -27 * s, 2 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(7 * s, -27 * s, 2 * s, 0, Math.PI * 2);
    ctx.fill();
    // angry eyebrows
    ctx.strokeStyle = '#3a6670';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-12 * s, -34 * s);
    ctx.lineTo(-3 * s, -32 * s);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(12 * s, -34 * s);
    ctx.lineTo(3 * s, -32 * s);
    ctx.stroke();
    // teeth
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-8 * s, -18 * s);
    ctx.lineTo(-6 * s, -13 * s);
    ctx.lineTo(-4 * s, -18 * s);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4 * s, -18 * s);
    ctx.lineTo(6 * s, -13 * s);
    ctx.lineTo(8 * s, -18 * s);
    ctx.fill();
    // mouth line
    ctx.strokeStyle = '#3a6670';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-10 * s, -18 * s);
    ctx.quadraticCurveTo(0, -15 * s, 10 * s, -18 * s);
    ctx.stroke();
    // chest fur tuft
    ctx.fillStyle = '#eef4f8';
    ctx.beginPath();
    ctx.ellipse(0, -4 * s, 12 * s, 10 * s, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (bearImgLoaded) {
    var imgW = 100, imgH = 68;
    ctx.drawImage(bearImg, -imgW / 2, -imgH / 2 + 5, imgW, imgH);
  } else {
    ctx.fillStyle = '#f5f0e8';
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.fill();
  }

  // Deflect shield bubble
  if (shieldTimer > 0) {
    var shieldAlpha = Math.min(1, shieldTimer / 20) * 0.6;
    var pulse = 1 + Math.sin(Date.now() / 100) * 0.05;
    var sr = (isBoss ? 55 : 50) * pulse;
    // outer glow
    ctx.globalAlpha = shieldAlpha * 0.3;
    ctx.fillStyle = '#40c0ff';
    ctx.beginPath();
    ctx.arc(0, 0, sr + 10, 0, Math.PI * 2);
    ctx.fill();
    // main shield
    ctx.globalAlpha = shieldAlpha * 0.25;
    ctx.fillStyle = '#80d8ff';
    ctx.beginPath();
    ctx.arc(0, 0, sr, 0, Math.PI * 2);
    ctx.fill();
    // bright rim
    ctx.globalAlpha = shieldAlpha * 0.7;
    ctx.strokeStyle = '#40c0ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, sr, 0, Math.PI * 2);
    ctx.stroke();
    // highlight shine
    ctx.globalAlpha = shieldAlpha * 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-sr * 0.3, -sr * 0.3, sr * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawSnowballs() {
  snowballs.forEach(function(s) {
    ctx.save();
    ctx.globalAlpha = s.alpha;

    if (s.wizard) {
      // wizard ice boulder - glowing, rotating, with trail
      var t = Date.now() / 150;
      // outer glow
      ctx.fillStyle = 'rgba(100, 150, 255, 0.3)';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 1.6, 0, Math.PI * 2);
      ctx.fill();
      // ice boulder (jagged circle)
      ctx.fillStyle = '#b0d4ff';
      ctx.beginPath();
      for (var i = 0; i < 10; i++) {
        var angle = (i / 10) * Math.PI * 2 + t;
        var rad = s.r * (0.85 + Math.sin(i * 2.5) * 0.2);
        if (i === 0) ctx.moveTo(s.x + Math.cos(angle) * rad, s.y + Math.sin(angle) * rad);
        else ctx.lineTo(s.x + Math.cos(angle) * rad, s.y + Math.sin(angle) * rad);
      }
      ctx.closePath();
      ctx.fill();
      // inner bright core
      ctx.fillStyle = '#e0eeff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // sparkle
      ctx.fillStyle = '#fff';
      drawStar(ctx, s.x - s.r * 0.3, s.y - s.r * 0.4, 3, 4);
      ctx.fillStyle = 'rgba(255,215,0,0.8)';
      drawStar(ctx, s.x + s.r * 0.4, s.y + s.r * 0.2, 2, 4);
    } else {
      // regular snowball
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#cde';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(200,230,255,0.6)';
      ctx.beginPath();
      ctx.arc(s.x - s.r * 0.3, s.y - s.r * 0.3, s.r * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  });
}

function drawSplashes() {
  splashes.forEach(function(s) {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = s.color || '#5ab8e8';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawStars() {
  stars.forEach(function(s) {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffd700';
    ctx.font = Math.round(s.size) + 'px sans-serif';
    ctx.fillText('*', s.x, s.y);
    ctx.restore();
  });
}

function drawBubbles() {
  bubbles.forEach(function(b) {
    ctx.save();
    var progress = 1 - b.life / b.maxLife;
    var floatY = b.y - progress * 20;
    var alpha = b.life < 20 ? b.life / 20 : 1;
    ctx.globalAlpha = alpha;

    // measure text
    ctx.font = '500 11px -apple-system, BlinkMacSystemFont, sans-serif';
    var metrics = ctx.measureText(b.text);
    var tw = metrics.width;
    var pad = 8;
    var bw = tw + pad * 2;
    var bh = 22;
    var bx = b.x - bw / 2;
    var by = floatY - bh;

    // bubble background
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    var r = 8;
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bw - r, by);
    ctx.arcTo(bx + bw, by, bx + bw, by + r, r);
    ctx.lineTo(bx + bw, by + bh - r);
    ctx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
    ctx.lineTo(bx + r, by + bh);
    ctx.arcTo(bx, by + bh, bx, by + bh - r, r);
    ctx.lineTo(bx, by + r);
    ctx.arcTo(bx, by, bx + r, by, r);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // little tail triangle pointing down
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(b.x - 5, by + bh - 1);
    ctx.lineTo(b.x, by + bh + 8);
    ctx.lineTo(b.x + 5, by + bh - 1);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // cover the stroke overlap
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - 4, by + bh - 2, 8, 3);

    // text
    ctx.fillStyle = '#333';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.text, b.x, by + bh / 2);

    ctx.restore();
  });
}

function updateAnimations() {
  // snowballs
  for (var i = snowballs.length - 1; i >= 0; i--) {
    var s = snowballs[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.3; // gravity
    s.life--;
    if (s.life < 10) s.alpha = s.life / 10;
    if (s.life <= 0) {
      // impact stars
      var numStars = s.wizard ? 12 : 5;
      for (var j = 0; j < numStars; j++) {
        stars.push({ x: s.x + (Math.random() - 0.5) * (s.wizard ? 60 : 30), y: s.y + (Math.random() - 0.5) * (s.wizard ? 40 : 20), alpha: 1, size: s.wizard ? 18 + Math.random() * 14 : 14 + Math.random() * 10, life: s.wizard ? 30 : 20 });
      }
      // wizard ice shards
      if (s.wizard) {
        for (var k = 0; k < 15; k++) {
          splashes.push({
            x: s.x + (Math.random() - 0.5) * 20,
            y: s.y + (Math.random() - 0.5) * 20,
            vx: (Math.random() - 0.5) * 8,
            vy: -Math.random() * 7 - 1,
            r: 2 + Math.random() * 4,
            alpha: 1,
            life: 25 + Math.random() * 20,
            maxLife: 45,
            color: ['#a0c4ff','#bdb2ff','#e0eeff','#ffd700','#9bf6ff'][Math.floor(Math.random()*5)]
          });
        }
      }
      snowballs.splice(i, 1);
    }
  }

  // splashes
  for (var i = splashes.length - 1; i >= 0; i--) {
    var sp = splashes[i];
    sp.x += sp.vx;
    sp.y += sp.vy;
    sp.vy += 0.15;
    sp.life--;
    sp.alpha = Math.max(0, sp.life / sp.maxLife);
    sp.r *= 0.98;
    if (sp.life <= 0) splashes.splice(i, 1);
  }

  // stars
  for (var i = stars.length - 1; i >= 0; i--) {
    var st = stars[i];
    st.life--;
    st.alpha = st.life / 20;
    st.y -= 0.5;
    if (st.life <= 0) stars.splice(i, 1);
  }

  // falling characters
  [penguin, bear].forEach(function(c) {
    if (c.falling) {
      c.fallSpeed += 0.4;
      c.fallY += c.fallSpeed;
      // spawn splash when hitting water
      if (c.fallY > WATER_Y - c.y - c.h / 2 + 10 && !c.splashed) {
        c.splashed = true;
        playSound('splash');
        var splashX = c.x + c.w / 2;
        for (var j = 0; j < 20; j++) {
          splashes.push({
            x: splashX + (Math.random() - 0.5) * 20,
            y: WATER_Y,
            vx: (Math.random() - 0.5) * 6,
            vy: -Math.random() * 6 - 2,
            r: 3 + Math.random() * 4,
            alpha: 1,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            color: ['#5ab8e8', '#8dd4f0', '#fff', '#3a9bd5'][Math.floor(Math.random() * 4)]
          });
        }
      }
    }
    // wobble decay
    if (c.wobble > 0) c.wobble *= 0.92;
    if (c.wobble < 0.3) c.wobble = 0;
  });

  // shield timer
  if (shieldTimer > 0) shieldTimer--;

  // bubbles
  for (var i = bubbles.length - 1; i >= 0; i--) {
    bubbles[i].life--;
    if (bubbles[i].life <= 0) bubbles.splice(i, 1);
  }
}

function drawSnowfall() {
  snowflakes.forEach(function(sf) {
    ctx.save();
    ctx.globalAlpha = sf.opacity;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sf.x, sf.y, sf.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    sf.y += sf.speed;
    sf.x += sf.drift + Math.sin(Date.now() / 2000 + sf.x) * 0.2;
    if (sf.y > 300) { sf.y = -5; sf.x = Math.random() * 500; }
    if (sf.x > 505) sf.x = -5;
    if (sf.x < -5) sf.x = 505;
  });
}

function drawSeagull() {
  if (!seagullActive) return;
  ctx.save();

  // Animated sprite from sheet
  if (seagullImgLoaded) {
    var frameIdx = Math.floor(Date.now() / 120) % SEAGULL_FRAMES;
    var srcX = frameIdx * SEAGULL_FRAME_W;
    var drawW = 70, drawH = 32;
    ctx.drawImage(seagullImg,
      srcX, 0, SEAGULL_FRAME_W, SEAGULL_FRAME_H,
      seagullX - drawW / 2, seagullY - drawH / 2, drawW, drawH
    );
  } else {
    // fallback: simple drawn seagull
    ctx.fillStyle = '#f5f5f0';
    ctx.beginPath();
    ctx.ellipse(seagullX, seagullY, 14, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(seagullX - 10, seagullY - 4, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // poop dropping
  if (seagullPoopY > 0) {
    var poopX = penguin.x + penguin.w / 2;
    // main blob
    ctx.fillStyle = '#f0ead0';
    ctx.strokeStyle = '#b8a878';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(poopX, seagullPoopY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // smaller attached blob
    ctx.fillStyle = '#e8e0c0';
    ctx.beginPath();
    ctx.arc(poopX + 3, seagullPoopY + 4, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // splat when near penguin
    if (seagullPoopY > penguin.y - 5) {
      ctx.fillStyle = '#e8e0c0';
      for (var sp = 0; sp < 6; sp++) {
        var splatAngle = (sp / 6) * Math.PI * 2;
        var splatDist = 8 + Math.sin(sp * 3) * 4;
        ctx.beginPath();
        ctx.arc(
          poopX + Math.cos(splatAngle) * splatDist,
          seagullPoopY + Math.sin(splatAngle) * splatDist * 0.5,
          2, 0, Math.PI * 2
        );
        ctx.fill();
      }
    }
  }

  ctx.restore();
}

function updateSeagull() {
  if (!seagullActive) return;
  seagullX -= 3;
  seagullY = 35 + Math.sin(Date.now() / 300) * 8;
  // Drop poop when over the penguin
  if (seagullX < penguin.x + penguin.w + 20 && seagullX > penguin.x - 20 && seagullPoopY === 0) {
    seagullPoopY = seagullY + 10;
    playSound('bomb');
  }
  if (seagullPoopY > 0 && seagullPoopY < penguin.y + 20) {
    seagullPoopY += 4;
  }
  if (seagullX < -30) {
    seagullActive = false;
    // Apply damage
    if (seagullPoopY > 0) {
      penguinHP--;
      penguin.wobble = 5;
      screenShake = 4;
      playSound('hit');
      showBubble('penguin', 'hit');
      updateHP();
      document.getElementById('battle-action').textContent = '💩 Seagull pooped on you! -1 HP';
      if (penguinHP <= 0) {
        setTimeout(function() {
          triggerFall(penguin);
          setTimeout(function() { playSound('lose'); endGame(false); }, 2000);
        }, 800);
      }
    }
    seagullPoopY = 0;
  }
}

function triggerSeagull() {
  seagullActive = true;
  seagullX = 520;
  seagullY = 35;
  seagullPoopY = 0;
}

function drawBossIndicator() {
  if (!isBoss) return;
  var pulse = 0.5 + Math.sin(Date.now() / 300) * 0.3;
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 3;
  ctx.strokeRect(2, 2, W - 4, H - 4);
  ctx.restore();

  // "BOSS" text
  ctx.save();
  ctx.font = '700 16px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(139, 92, 246, ' + (0.6 + pulse * 0.4) + ')';
  ctx.textAlign = 'center';
  ctx.fillText('⭐ BOSS BATTLE ⭐', W / 2, 20);
  ctx.restore();
}

function drawScene() {
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    var sx = (Math.random() - 0.5) * screenShake * 2;
    var sy = (Math.random() - 0.5) * screenShake * 2;
    ctx.translate(sx, sy);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  ctx.clearRect(-10, -10, W + 20, H + 20);
  drawSky();
  drawSnowfall();
  drawWater();
  drawIce();
  drawPenguin(penguin);
  drawBear(bear);
  drawSnowballs();
  drawSplashes();
  drawStars();
  drawBubbles();
  drawSeagull();
  drawBossIndicator();

  ctx.restore();
}

function gameLoop() {
  updateAnimations();
  drawScene();

  updateSeagull();
  // Victory dance: penguin bounces extra
  if (victoryDance > 0) victoryDance--;

  animFrame = requestAnimationFrame(gameLoop);
}

function launchSnowball(from) {
  var isWizard = from === 'penguin' && streak >= 3;
  if (from === 'penguin') {
    snowballs.push({
      x: penguin.x + penguin.w,
      y: penguin.y + 10,
      vx: isWizard ? 7 : 8,
      vy: isWizard ? -3 : -4,
      r: isWizard ? 18 : 8,
      alpha: 1,
      life: isWizard ? 35 : 30,
      wizard: isWizard
    });
    // wizard trail particles
    if (isWizard) {
      for (var t = 0; t < 8; t++) {
        setTimeout(function() {
          splashes.push({
            x: penguin.x + penguin.w + Math.random() * 30,
            y: penguin.y + 10 + (Math.random() - 0.5) * 20,
            vx: 2 + Math.random() * 3,
            vy: (Math.random() - 0.5) * 3,
            r: 2 + Math.random() * 3,
            alpha: 1,
            life: 20 + Math.random() * 15,
            maxLife: 35,
            color: ['#a0c4ff','#bdb2ff','#ffd6a5','#caffbf','#9bf6ff'][Math.floor(Math.random()*5)]
          });
        }, t * 40);
      }
    }
  } else {
    snowballs.push({
      x: bear.x,
      y: bear.y + 10,
      vx: -8,
      vy: -4,
      r: 8,
      alpha: 1,
      life: 30,
      wizard: false
    });
  }
}

function triggerFall(who) {
  who.falling = true;
  who.fallSpeed = 0;
  who.fallY = 0;
  who.splashed = false;
}

function startBoss() {
  isBoss = true;
  bossHP = bossMaxHP;
  screenShake = 15;
  // Intensify snowfall for blizzard
  for (var i = 0; i < 60; i++) {
    snowflakes.push({
      x: Math.random() * 500,
      y: Math.random() * 300,
      r: 1 + Math.random() * 3,
      speed: 1.5 + Math.random() * 2.5,
      drift: -1.5 + Math.random() * -1,
      opacity: 0.4 + Math.random() * 0.5
    });
  }
  document.getElementById('battle-action').innerHTML = '<span style="color:#8b5cf6;">&#x1F9CA; BOSS BATTLE! The Yeti appears!</span>';
  var bFill = document.getElementById('bear-hp-fill');
  bFill.style.width = '100%';
  bFill.style.background = '#8b5cf6';
  document.getElementById('bear-hp-text').textContent = bossHP + ' / ' + bossMaxHP + ' ⭐';
  document.getElementById('bear-hp-fill').parentElement.previousElementSibling.textContent = 'Yeti';
  playSound('wizard');
  setTimeout(nextQuestion, 1500);
}

function startBossTimer() {
  bossTimer = 7;
  updateTimerDisplay();
  if (bossTimerInterval) clearInterval(bossTimerInterval);
  bossTimerInterval = setInterval(function() {
    bossTimer--;
    updateTimerDisplay();
    if (bossTimer <= 0) {
      clearInterval(bossTimerInterval);
      bossTimerInterval = null;
      if (!locked) {
        // Time's up - count as wrong
        locked = true;
        streak = 0;
        totalWrong++;
        playSound('wrong');
        penguinHP--;
        penguin.wobble = 6;
        screenShake = 5;
        launchSnowball('bear');
        showBubble('bear', 'attack');
        setTimeout(function() { showBubble('penguin', 'hit'); playSound('hit'); }, 400);
        document.getElementById('feedback').innerHTML = '<span style="color:#a32d2d;">&#x23F0; Time\'s up! Answer was ' + currentAnswer + '</span>';
        document.getElementById('battle-action').textContent = '⏰ Too slow! The Yeti strikes!';
        // Show correct answer
        var allBtns = document.getElementById('choices').querySelectorAll('.choice-btn');
        allBtns.forEach(function(b) {
          if (parseInt(b.textContent) === currentAnswer) b.classList.add('correct');
        });
        updateHP();
        round++;
        document.getElementById('score').textContent = score;
        document.getElementById('streak').textContent = streak;
        if (penguinHP <= 0) {
          if (bossTimerInterval) { clearInterval(bossTimerInterval); bossTimerInterval = null; }
          setTimeout(function() {
            triggerFall(penguin);
            setTimeout(function() { playSound('lose'); endGame(false); }, 2000);
          }, 800);
        } else {
          // Clear old question briefly, then show new one
          setTimeout(function() {
            document.getElementById('question').textContent = '...';
            document.getElementById('choices').innerHTML = '';
            document.getElementById('feedback').textContent = '';
            setTimeout(nextQuestion, 300);
          }, 1200);
        }
      }
    }
  }, 1000);
}

function updateTimerDisplay() {
  var timerEl = document.getElementById('boss-timer');
  if (!timerEl) return;
  if (!isBoss) { timerEl.style.display = 'none'; return; }
  timerEl.style.display = 'block';
  timerEl.textContent = bossTimer;
  if (bossTimer <= 2) {
    timerEl.style.color = '#e24b4a';
    timerEl.style.borderColor = '#e24b4a';
    timerEl.style.background = '#fde8e8';
    timerEl.style.transform = 'scale(1.15)';
    timerEl.style.fontSize = '28px';
  } else if (bossTimer <= 4) {
    timerEl.style.color = '#ef9f27';
    timerEl.style.borderColor = '#ef9f27';
    timerEl.style.background = '#fff8ec';
    timerEl.style.transform = 'scale(1.05)';
    timerEl.style.fontSize = '26px';
  } else {
    timerEl.style.color = '#8b5cf6';
    timerEl.style.borderColor = '#8b5cf6';
    timerEl.style.background = '#f3f0ff';
    timerEl.style.transform = 'scale(1)';
    timerEl.style.fontSize = '26px';
  }
}

// ---- GAME LOGIC ----
// ---- SOUND EFFECTS (Web Audio API, no files needed) ----
var audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  // iOS Safari requires resume on user gesture
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playSound(type) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    var now = audioCtx.currentTime;

    if (type === 'throw') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'hit') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now);
      osc.stop(now + 0.25);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.08);
      osc.frequency.setValueAtTime(784, now + 0.16);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(250, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.3);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
    } else if (type === 'wizard') {
      // magical ascending arpeggio
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(600, now + 0.06);
      osc.frequency.setValueAtTime(800, now + 0.12);
      osc.frequency.setValueAtTime(1200, now + 0.18);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
      // add shimmer
      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(1600, now + 0.1);
      osc2.frequency.exponentialRampToValueAtTime(2400, now + 0.3);
      gain2.gain.setValueAtTime(0.06, now + 0.1);
      gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc2.start(now + 0.1);
      osc2.stop(now + 0.4);
    } else if (type === 'bomb') {
      // descending whistle - bomb falling
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.6);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.65);
      osc.start(now);
      osc.stop(now + 0.65);
      // add a second wobbling tone for comedic effect
      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(800, now);
      osc2.frequency.exponentialRampToValueAtTime(100, now + 0.55);
      gain2.gain.setValueAtTime(0.06, now);
      gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc2.start(now);
      osc2.stop(now + 0.6);
    } else if (type === 'splash') {
      // white noise burst for splash
      var bufSize = audioCtx.sampleRate * 0.3;
      var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      var data = buf.getChannelData(0);
      for (var i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / bufSize);
      var noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      var noiseGain = audioCtx.createGain();
      noise.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noiseGain.gain.setValueAtTime(0.15, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      noise.start(now);
      noise.stop(now + 0.3);
      return;
    } else if (type === 'win') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.12);
      osc.frequency.setValueAtTime(784, now + 0.24);
      osc.frequency.setValueAtTime(1047, now + 0.36);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc.start(now);
      osc.stop(now + 0.6);
    } else if (type === 'lose') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc.start(now);
      osc.stop(now + 0.6);
    }
  } catch(e) {}
}

var diff = 'easy';
var maxNum = 5;
var mathOp = 'mul'; // add, sub, addsub, mul, div, muldiv
var penguinHP, bearHP, maxHP = 10;
var score, streak, round, totalCorrect, totalWrong;
var currentAnswer;
var locked = false;
var isBoss = false;
var bossHP = 0;
var bossMaxHP = 3;
var hasPirateHat = false;
var screenShake = 0;
var snowflakes = [];
var victoryDance = 0;
var bossTimer = 0;
var bossTimerInterval = null;

// Power-up / event state
var doubleDamageNext = false;
var timedNextRound = false;
var seagullStealNext = false;
var mysteryBoxAvailable = false;
var seagullActive = false;
var seagullX = 0;
var seagullY = 0;
var seagullPoopY = 0;
var seagullFrame = 0;
var deflected = false;
var shieldTimer = 0; // frames to show shield bubble

// Initialize snowflakes
for (var sf = 0; sf < 40; sf++) {
  snowflakes.push({
    x: Math.random() * 500,
    y: Math.random() * 300,
    r: 1 + Math.random() * 2.5,
    speed: 0.3 + Math.random() * 0.8,
    drift: (Math.random() - 0.5) * 0.5,
    opacity: 0.3 + Math.random() * 0.5
  });
}

function setOp(op) {
  mathOp = op;
  ['add','sub','addsub','mul','div','muldiv'].forEach(function(k) {
    var b = document.getElementById('btn-op-' + k);
    if (b) {
      if (k === op) { b.classList.add('active'); }
      else { b.classList.remove('active'); }
    }
  });
}

function setDiff(d) {
  diff = d;
  maxNum = d === 'easy' ? 5 : d === 'medium' ? 9 : 12;
  ['easy','medium','hard'].forEach(function(k) {
    var b = document.getElementById('btn-' + k);
    if (b) {
      if (k === d) { b.classList.add('active'); }
      else { b.classList.remove('active'); }
    }
  });
}

function startGame() {
  initAudio();
  penguinHP = maxHP;
  bearHP = maxHP;
  score = 0; streak = 0; round = 1;
  totalCorrect = 0; totalWrong = 0;
  locked = false;
  penguin.falling = false; penguin.fallY = 0; penguin.wobble = 0;
  bear.falling = false; bear.fallY = 0; bear.wobble = 0;
  snowballs = []; splashes = []; stars = []; bubbles = [];
  isBoss = false; bossHP = 0;
  // hasPirateHat persists across games once earned!
  doubleDamageNext = false; timedNextRound = false; seagullStealNext = false;
  mysteryBoxAvailable = false; seagullActive = false; deflected = false;
  screenShake = 0; victoryDance = 0;
  if (bossTimerInterval) { clearInterval(bossTimerInterval); bossTimerInterval = null; }
  var timerEl = document.getElementById('boss-timer');
  if (timerEl) timerEl.style.display = 'none';
  // Reset snowfall to gentle
  snowflakes = [];
  for (var sf = 0; sf < 40; sf++) {
    snowflakes.push({
      x: Math.random() * 500, y: Math.random() * 300,
      r: 1 + Math.random() * 2.5, speed: 0.3 + Math.random() * 0.8,
      drift: (Math.random() - 0.5) * 0.5, opacity: 0.3 + Math.random() * 0.5
    });
  }
  // Reset enemy label
  var bearLabel = document.querySelector('#screen-game div[style*="text-align: right"] div[style*="font-weight: 600"]');
  if (bearLabel) bearLabel.textContent = 'White bear';

  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('screen-end').style.display = 'none';
  document.getElementById('screen-game').style.display = 'block';
  gameState = 'playing';
  updateHP();
  document.getElementById('battle-action').textContent = 'Solve the problem to attack!';
  nextQuestion();
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function nextQuestion() {
  locked = false;
  deflected = false;

  // 10% chance of random seagull poop attack
  if (round > 1 && Math.random() < 0.20 && !seagullActive && penguinHP > 1) {
    triggerSeagull();
  }


  // Generate question based on selected math operation
  var a, b, questionText;
  var op = mathOp;
  // For mixed modes, pick one randomly
  if (op === 'addsub') op = Math.random() < 0.5 ? 'add' : 'sub';
  if (op === 'muldiv') op = Math.random() < 0.5 ? 'mul' : 'div';

  var bossMin = Math.max(3, Math.floor(maxNum * 0.5));

  // Numbers stay within the difficulty range:
  // Easy: 1-5, Medium: 1-9, Hard: 1-12
  // Difficulty ranges:
  // Easy(5): add/sub operands 1-5, mul factors 2-5, div divisor 2-3
  // Medium(9): add/sub operands 1-9, mul factors 2-9, div divisor 2-5
  // Hard(12): add/sub operands 1-12, mul factors 2-12, div divisor 2-7
  // Division divisor range scales with difficulty: easy 2-5, medium 2-7, hard 2-10
  var divMax = maxNum <= 5 ? 5 : maxNum <= 9 ? 7 : 10;
  var subMax = maxNum <= 5 ? Math.min(maxNum, 3) : maxNum;

  if (op === 'add') {
    a = isBoss ? randInt(bossMin, maxNum) : randInt(1, maxNum);
    b = isBoss ? randInt(bossMin, maxNum) : randInt(1, maxNum);
    currentAnswer = a + b;
    questionText = a + ' + ' + b + ' = ?';
  } else if (op === 'sub') {
    // answer and subtracted number both stay within difficulty range
    // on easy: answer 1-5, subtract 1-3, so displayed number maxes at 8
    var ans = isBoss ? randInt(bossMin, maxNum) : randInt(1, maxNum);
    b = isBoss ? randInt(bossMin, maxNum) : randInt(1, subMax);
    a = ans + b;
    currentAnswer = ans;
    questionText = a + ' - ' + b + ' = ?';
  } else if (op === 'mul') {
    a = isBoss ? randInt(bossMin, maxNum) : randInt(2, maxNum);
    b = isBoss ? randInt(bossMin, maxNum) : randInt(2, maxNum);
    if (Math.random() < 0.5) { var tmp = a; a = b; b = tmp; }
    currentAnswer = a * b;
    questionText = a + ' × ' + b + ' = ?';
  } else if (op === 'div') {
    // answer stays in difficulty range, divisor always 2+
    // easy: answer 1-5, divisor 2-5, dividend max 25
    // medium: answer 1-9, divisor 2-7, dividend max 63
    // hard: answer 1-12, divisor 2-10, dividend max 120
    var ans = isBoss ? randInt(bossMin, maxNum) : randInt(1, maxNum);
    b = isBoss ? randInt(3, divMax) : randInt(2, divMax);
    a = ans * b;
    currentAnswer = ans;
    questionText = a + ' ÷ ' + b + ' = ?';
  }

  document.getElementById('question').textContent = questionText;
  // Boss timer
  if (isBoss) {
    startBossTimer();
  } else {
    if (bossTimerInterval) { clearInterval(bossTimerInterval); bossTimerInterval = null; }
    var timerEl = document.getElementById('boss-timer');
    if (timerEl) timerEl.style.display = 'none';
  }
  document.getElementById('feedback').textContent = '';
  document.getElementById('round').textContent = round;
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;

  // Generate plausible wrong answers based on operation type
  var wrongs = [];
  var spread = (op === 'div') ? 3 : (op === 'add' || op === 'sub') ? 8 : 5;
  while (wrongs.length < 3) {
    var offset = randInt(-spread, spread);
    if (offset === 0) offset = randInt(1, spread);
    var w = currentAnswer + offset;
    if (w < 0) w = currentAnswer + randInt(1, spread);
    if (w === 0 && op !== 'sub') w = currentAnswer + randInt(1, spread);
    if (w !== currentAnswer && wrongs.indexOf(w) === -1) wrongs.push(w);
  }
  var options = wrongs.concat([currentAnswer]);
  options.sort(function() { return Math.random() - 0.5; });

  var choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';

  // Seagull steal: remove one wrong answer
  if (seagullStealNext) {
    seagullStealNext = false;
    var wrongToRemove = options.find(function(o) { return o !== currentAnswer; });
    if (wrongToRemove !== undefined) {
      options = options.filter(function(o, i) {
        return o === currentAnswer || o !== wrongToRemove;
      });
    }
    document.getElementById('battle-action').textContent = '🐦 Seagull stole one answer!';
  }

  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt;
    btn.onclick = function() { checkAnswer(opt, btn); };
    choicesDiv.appendChild(btn);
  });

}

function checkAnswer(chosen, btn) {
  if (locked) return;
  locked = true;
  if (bossTimerInterval) { clearInterval(bossTimerInterval); bossTimerInterval = null; }
  var allBtns = document.getElementById('choices').querySelectorAll('.choice-btn');

  if (chosen === currentAnswer) {
    totalCorrect++;
    streak++;
    var bonus = streak >= 3 ? 2 : 1;
    score += bonus;
    btn.classList.add('correct');
    playSound('correct');

    // 15% chance of deflect (enemy blocks the snowball)
    if (Math.random() < 0.15 && !doubleDamageNext) {
      deflected = true;
      shieldTimer = 60;
      document.getElementById('feedback').innerHTML = '<span style="color:#ef9f27;">✔ Correct! But the ' + (isBoss ? 'Yeti' : 'white bear') + ' deflected it!</span>';
      launchSnowball('penguin');
      showBubble('penguin', 'attack');
      playSound('throw');
      setTimeout(function() {
        document.getElementById('battle-action').textContent = '🛡 Deflected! No damage!';
        playSound('wrong');
      }, 400);
      bear.wobble = 2;
    } else {
      // Normal hit (or double damage)
      var damage = doubleDamageNext ? 2 : 1;
      if (doubleDamageNext) {
        document.getElementById('feedback').innerHTML = '<span style="color:#8b5cf6;">✔ Correct! 💥 DOUBLE DAMAGE!' + (bonus > 1 ? ' +' + bonus : ' +1') + '</span>';
        doubleDamageNext = false;
        screenShake = 10;
      } else {
        document.getElementById('feedback').innerHTML = '<span style="color:#0f6e56;">✔ Correct!' + (bonus > 1 ? ' Streak bonus! +2' : ' +1') + '</span>';
      }
      launchSnowball('penguin');
      showBubble('penguin', 'attack');
      playSound(streak >= 3 ? 'wizard' : 'throw');
      setTimeout(function() { showBubble('bear', 'hit'); playSound('hit'); screenShake = 5; }, 400);
      if (isBoss) {
        bossHP -= damage;
        var bFill = document.getElementById('bear-hp-fill');
        bFill.style.width = Math.max(0, (bossHP / bossMaxHP) * 100) + '%';
        document.getElementById('bear-hp-text').textContent = Math.max(0, bossHP) + ' / ' + bossMaxHP + ' ⭐';
        document.getElementById('battle-action').textContent = '❄️ Hit the Yeti! ' + Math.max(0, bossHP) + ' HP left!';
      } else {
        bearHP -= damage;
        document.getElementById('battle-action').textContent = damage > 1 ? '💥 Double hit on the white bear!' : '❄️ Snowball hits the white bear!';
      }
      bear.wobble = 6;
    }
  } else {
    totalWrong++;
    streak = 0;
    btn.classList.add('wrong');
    playSound('wrong');
    allBtns.forEach(function(b) {
      if (parseInt(b.textContent) === currentAnswer) b.classList.add('correct');
    });
    // Yeti always counter-attacks: 2 damage. Bear: 1 damage.
    var enemyDmg = isBoss ? 2 : 1;
    document.getElementById('feedback').innerHTML = '<span style="color:#a32d2d;">✘ The answer was ' + currentAnswer + (isBoss ? ' — Yeti counter-attacks!' : '') + '</span>';
    launchSnowball('bear');
    playSound('throw');
    if (isBoss) {
      // Second snowball slightly delayed for counter-attack feel
      setTimeout(function() { launchSnowball('bear'); playSound('throw'); }, 300);
    }
    showBubble('bear', 'attack');
    setTimeout(function() {
      showBubble('penguin', 'hit');
      playSound('hit');
      if (isBoss) setTimeout(function() { playSound('hit'); }, 250);
      screenShake = isBoss ? 8 : 4;
    }, 400);
    penguinHP -= enemyDmg;
    penguin.wobble = isBoss ? 10 : 6;
    if (isBoss) {
      document.getElementById('battle-action').textContent = '💥💥 Yeti counter-attacks! -2 HP!';
    } else {
      document.getElementById('battle-action').textContent = '💥 White bear throws a snowball at you!';
    }
  }

  updateHP();
  round++;
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;

  if (isBoss && bossHP <= 0) {
    // Boss defeated - yeti falls in water!
    hasPirateHat = true;
    screenShake = 20;
    if (bossTimerInterval) { clearInterval(bossTimerInterval); bossTimerInterval = null; }
    document.getElementById('battle-action').innerHTML = '<span style="color:#0f6e56;">&#x2694;&#xFE0F; YETI DEFEATED! Pirate hat unlocked!</span>';
    setTimeout(function() {
      triggerFall(bear);
      setTimeout(function() {
        isBoss = false;
        playSound('win');
        victoryDance = 90;
        endGame(true);
      }, 2000);
    }, 800);
  } else if (!isBoss && bearHP <= 0) {
    // Bear defeated - falls in water, then boss starts!
    setTimeout(function() {
      triggerFall(bear);
      setTimeout(function() {
        bear.falling = false; bear.fallY = 0; bear.wobble = 0;
        startBoss();
      }, 2000);
    }, 800);
  } else if (isBoss && penguinHP <= 0) {
    // Lost during boss
    if (bossTimerInterval) { clearInterval(bossTimerInterval); bossTimerInterval = null; }
    setTimeout(function() {
      triggerFall(penguin);
      setTimeout(function() { playSound('lose'); endGame(false); }, 2000);
    }, 800);
  } else if (penguinHP <= 0) {
    setTimeout(function() {
      triggerFall(penguin);
      setTimeout(function() { playSound('lose'); endGame(false); }, 2000);
    }, 800);
  } else {
    setTimeout(nextQuestion, 1400);
  }
}

function updateHP() {
  var pPct = Math.max(0, (penguinHP / maxHP) * 100);
  var pFill = document.getElementById('penguin-hp-fill');
  var bFill = document.getElementById('bear-hp-fill');
  pFill.style.width = pPct + '%';
  pFill.style.background = pPct <= 20 ? '#e24b4a' : pPct <= 40 ? '#ef9f27' : '#1d9e75';
  document.getElementById('penguin-hp-text').textContent = Math.max(0, penguinHP) + ' / ' + maxHP;

  if (!isBoss) {
    var bPct = Math.max(0, (bearHP / maxHP) * 100);
    bFill.style.width = bPct + '%';
    bFill.style.background = bPct <= 20 ? '#e24b4a' : bPct <= 40 ? '#ef9f27' : '#e24b4a';
    document.getElementById('bear-hp-text').textContent = Math.max(0, bearHP) + ' / ' + maxHP;
  }
}

function endGame(won) {
  gameState = 'ended';
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-end').style.display = 'block';
  var accuracy = totalCorrect + totalWrong > 0 ? Math.round((totalCorrect / (totalCorrect + totalWrong)) * 100) : 0;
  if (won) {
    document.getElementById('end-title').textContent = hasPirateHat ? '🎉🏴‍☠️ You win!' : '🎉 You win!';
    document.getElementById('end-msg').textContent = hasPirateHat
      ? 'The Yeti is defeated! Your penguin is now a pirate captain!'
      : 'Your penguin wins the arctic math battle!';
  } else {
    document.getElementById('end-title').textContent = '💦 Oh no! You fell in the icy water!';
    document.getElementById('end-msg').textContent = 'Try again!';
  }
  var statsHtml = 'Score: ' + score + '  ·  Correct: ' + totalCorrect +
    '  ·  Wrong: ' + totalWrong + '  ·  Accuracy: ' + accuracy + '%';
  if (hasPirateHat) statsHtml += '<br>🏴‍☠️ Pirate hat earned!';
  document.getElementById('end-stats').innerHTML = statsHtml;
}

// Start render loop
gameLoop();
